name: Update FX News

on:
  schedule:
    - cron: "0 22 * * 0-4"
    - cron: "0 0,2,4,6,8,10 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch FX news
        run: python3 fetch_news.py

      - name: Sync purchases from Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: C0B70ASGC84
        run: python3 sync_slack.py || echo "Slack 동기화 건너뜀"

      - name: Commit & push if changed
        id: commit
        run: |
          git config user.name "sein-fx-bot"
          git config user.email "actions@github.com"
          git add news.json purchases.json
          if git diff --cached --quiet; then
            echo "변경 없음"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: FX update $(date -u '+%Y-%m-%d %H:%M') UTC"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Pages build
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/pages/builds" || echo "Pages 빌드 트리거 실패"
