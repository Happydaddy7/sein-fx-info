# .github/workflows/update-news.yml
# 외환 뉴스 자동 수집 — 평일 KST 07~19시, 2시간 간격
name: Update FX News

on:
  schedule:
    # cron은 UTC 기준. KST 07,09,11,13,15,17,19시 = UTC 22,00,02,04,06,08,10시
    - cron: "0 22 * * 0-4"   # KST 월~금 07:00
    - cron: "0 0,2,4,6,8,10 * * 1-5"   # KST 월~금 09~19시
  workflow_dispatch: {}      # 수동 실행 버튼

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch FX news
        run: python3 fetch_news.py

      - name: Commit & push if changed
        run: |
          git config user.name "sein-fx-bot"
          git config user.email "actions@github.com"
          git add news.json
          git diff --cached --quiet && echo "변경 없음" && exit 0
          git commit -m "chore: FX news update $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
